name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify

  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Start production server
        run: npm run start -- -p 4173 > /tmp/queueglass.log 2>&1 &
      - name: Wait for simulator
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/queueglass.log
          exit 1
      - run: npm run test:browser
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: queueglass-browser-proof
          path: |
            output/
            docs/queueglass.png
